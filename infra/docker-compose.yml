version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: personal_ai_postgres
    restart: always
    environment:
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: secure_password_change_me
      POSTGRES_DB: personal_ai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_user -d personal_ai_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: personal_ai_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - ai_network
    environment:
      - QDRANT__SERVICE__API_PORT=6333

  backend:
    build: 
      context: ../backend
      dockerfile: Dockerfile
    container_name: personal_ai_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ../models:/app/models
      - ../backend:/app
    environment:
      - DATABASE_URL=postgresql://ai_user:secure_password_change_me@postgres:5432/personal_ai_db
      - QDRANT_URL=http://qdrant:6333
      - MODEL_PATH=/app/models/mistral-7b-instruct-v0.3.Q4_K_M.gguf
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - ai_network

volumes:
  postgres_data:
  qdrant_data:

networks:
  ai_network:
    driver: bridge
